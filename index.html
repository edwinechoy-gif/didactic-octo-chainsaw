<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#111111">
<title>Accountability Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<style>
  :root {
    --bg: #111111; --bg2: #181818; --bg3: #202020; --surface: #222222; --surface2: #2a2a2a;
    --green: #3dba6f; --green-dim: #2a9455; --green-glow: #3dba6f22;
    --text: #f0f0f0; --text2: #909090; --text3: #555555;
    --border: #2e2e2e; --border2: #3a3a3a;
    --app-color: #3dba6f; --gos-color: #5ba8e0; --misc-color: #c49a3a;
    --danger: #e05555; --radius: 14px; --radius-sm: 8px;
    --nav-height: calc(65px + env(safe-area-inset-bottom));
  }

  body.day-mode {
    --bg: #f2f4f0; --bg2: #e8ebe4; --bg3: #dde1d8; --surface: #ffffff; --surface2: #eef0eb;
    --green: #2a9455; --green-dim: #1e7040; --text: #1a1a1a; --text2: #555555; --text3: #999999;
    --border: #d0d4cc; --border2: #c0c5bb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; height: 100dvh; overflow: hidden; }

  .app { height: 100%; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }

  /* ── TOP BAR ── */
  .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .topbar-title { font-size: 18px; font-weight: 500; }
  .topbar-sub { font-size: 11px; color: var(--text3); font-family: 'DM Mono'; }
  .week-nav { display: flex; align-items: center; gap: 8px; }
  .week-nav button { background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; color: var(--text2); width: 28px; height: 28px; cursor: pointer; }
  .week-label { font-family: 'DM Mono'; font-size: 13px; color: var(--green); min-width: 70px; text-align: center; }

  /* ── SCREENS ── */
  .screen { display: none; flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 20px; }
  .screen.active { display: flex; flex-direction: column; gap: 12px; }
  #screen-service { padding-bottom: 0; }

  /* ── CARDS ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .card-label { font-size: 14px; font-weight: 500; margin-bottom: 12px; display: flex; justify-content: space-between; }

  /* ── CHECKBOXES (LIFE) ── */
  .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .day-cell { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .day-cell-label { font-size: 10px; font-family: 'DM Mono'; color: var(--text3); }
  .check-box {
    width: 32px; height: 32px; border-radius: 6px; border: 1.5px solid var(--border2);
    background: var(--bg3); cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .check-box.checked { background: var(--green-glow); border-color: var(--green); }
  .check-box.checked::after { content: '✓'; color: var(--green); font-weight: bold; font-size: 14px; }
  
  .life-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-top: 1px solid var(--border); }
  .life-row-inline { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .inline-comment { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: 4px; padding: 6px; color: var(--text); font-size: 12px; display: none; }
  .checked-row .inline-comment { display: block; }

  /* ── SERVICE TOTALS ── */
  .totals-row { display: flex; border-top: 1px solid var(--border); padding-top: 12px; }
  .total-box { flex: 1; text-align: center; border-right: 1px solid var(--border); }
  .total-box:last-child { border-right: none; }
  .total-num { font-size: 20px; font-weight: 500; }
  .total-lbl { font-size: 9px; font-family: 'DM Mono'; text-transform: uppercase; color: var(--text3); }

  /* ── ENTRIES LIST (Fills height) ── */
  .entries-card { flex: 1; display: flex; flex-direction: column; min-height: 0; margin-bottom: 0; border-bottom: none; border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  #entry-list { flex: 1; overflow-y: auto; margin: 8px -16px 0; padding: 0 16px; }

  /* ── SWIPE & ITEMS ── */
  .entry-container { position: relative; margin-bottom: 8px; overflow: hidden; border-radius: var(--radius-sm); background: var(--danger); }
  .entry-item { 
    background: var(--bg3); border: 1px solid var(--border); padding: 12px; 
    display: flex; gap: 10px; transition: transform 0.2s; position: relative; z-index: 2;
  }
  .entry-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; }
  .entry-dot.app { background: var(--app-color); }
  .entry-dot.gos { background: var(--gos-color); }
  .entry-dot.misc { background: var(--misc-color); }
  
  .swipe-action { position: absolute; top: 0; height: 100%; width: 60px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 12px; z-index: 1; }
  .swipe-del { right: 0; background: var(--danger); }
  .swipe-edit { left: 0; background: var(--gos-color); }

  /* ── FORM ── */
  .time-input-row { display: flex; gap: 8px; }
  .time-input-row select { flex: 1; padding: 12px; background: var(--bg3); color: var(--text); border: 1px solid var(--border2); border-radius: 8px; font-size: 15px; }

  /* ── NAV BAR ── */
  .nav { height: var(--nav-height); background: var(--bg2); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: none; border: none; opacity: 0.5; }
  .nav-btn.active { opacity: 1; color: var(--green); }
  .nav-icon { width: 22px; height: 22px; margin-bottom: 4px; }
  .nav-label { font-size: 10px; font-family: 'DM Mono'; }

  .add-entry-btn { background: var(--green); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">Manny Choy</div>
      <div class="topbar-sub">Full-timers Report</div>
    </div>
    <div class="week-nav">
      <button onclick="shiftWeek(-1)">←</button>
      <div class="week-label" id="week-label"></div>
      <button onclick="shiftWeek(1)">→</button>
    </div>
  </div>

  <!-- LIFE -->
  <div class="screen active" id="screen-life">
    <div class="card">
      <div class="card-label">Daily personal time <span id="day-count">0/7</span></div>
      <div class="day-grid" id="personal-grid"></div>
    </div>
    <div class="card">
      <div class="card-label">Daily prayer time <span id="prayer-count">0/7</span></div>
      <div class="day-grid" id="prayer-grid"></div>
    </div>
    <div class="card" id="life-rows"></div>
  </div>

  <!-- SERVICE -->
  <div class="screen" id="screen-service">
    <div class="card">
      <div class="card-label">Weekly Goals</div>
      <div class="totals-row">
        <div class="total-box"><div class="total-num" id="tot-app" style="color:var(--app-color)">0 / 10</div><div class="total-lbl">Appt</div></div>
        <div class="total-box"><div class="total-num" id="tot-gos" style="color:var(--gos-color)">0 / 2</div><div class="total-lbl">Gospel</div></div>
        <div class="total-box"><div class="total-num" id="tot-misc" style="color:var(--misc-color)">0</div><div class="total-lbl">Misc</div></div>
      </div>
    </div>
    <div class="card entries-card">
      <div class="card-label">Entries (Swipe to Edit/Del)</div>
      <div id="entry-list"></div>
      <button class="add-entry-btn" onclick="openAdd()">+ Add Entry</button>
    </div>
  </div>

  <!-- FORM SCREEN (ADD/EDIT) -->
  <div class="screen" id="screen-add">
    <h3 id="form-title" style="margin-bottom:15px">New Entry</h3>
    <div class="card">
      <div style="margin-bottom:12px">
        <label class="total-lbl">Day</label>
        <select id="f-day" style="width:100%; padding:10px; background:var(--bg3); color:var(--text); border:1px solid var(--border2); border-radius:8px;">
          <option>Lord's day</option><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option>
        </select>
      </div>
      <div style="margin-bottom:12px">
        <label class="total-lbl">Start Time</label>
        <div class="time-input-row">
          <select id="f-start-time"></select>
          <select id="f-start-ampm"><option>AM</option><option>PM</option></select>
        </div>
      </div>
      <div style="margin-bottom:12px">
        <label class="total-lbl">Description</label>
        <textarea id="f-desc" placeholder="Details..." style="width:100%; height:60px; padding:10px; background:var(--bg3); color:var(--text); border:1px solid var(--border2); border-radius:8px;"></textarea>
      </div>
      <div style="margin-bottom:12px">
        <label class="total-lbl">Category</label>
        <div class="time-input-row">
          <select id="f-cat" onchange="toggleApptType()">
            <option value="app">Appointment</option>
            <option value="gos">Gospel</option>
            <option value="misc">Misc</option>
          </select>
          <select id="f-appt-type">
            <option value="student">Student</option>
            <option value="non-student">Non-student</option>
          </select>
        </div>
      </div>
      <button class="add-entry-btn" onclick="saveEntry()">Save Entry</button>
      <button class="add-entry-btn" style="background:var(--surface2); color:var(--text2)" onclick="navTo('service')">Cancel</button>
    </div>
  </div>

  <!-- EXPORT -->
  <div class="screen" id="screen-export">
    <div class="card">
      <div class="card-label">Export Data</div>
      <button class="add-entry-btn" onclick="exportCSV()">Download CSV</button>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" id="nav-life" onclick="navTo('life')"><span class="nav-label">LIFE</span></button>
    <button class="nav-btn" id="nav-service" onclick="navTo('service')"><span class="nav-label">SERVICE</span></button>
    <button class="nav-btn" id="nav-export" onclick="navTo('export')"><span class="nav-label">EXPORT</span></button>
  </nav>
</div>

<script>
let state = JSON.parse(localStorage.getItem('manny_report_v3') || '{}');
let currentWeek = getMondayStr(new Date());
let editingId = null;

const DAYS = ["Lord's day", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
const LIFE_KEYS = [
  { k: 'rnr', l: 'R & R Completion' },
  { k: 'companion', l: 'Companion Prayer', c: true },
  { k: 'airtable', l: 'Airtable Updated' }
];

function getMondayStr(d) {
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff)).toISOString().slice(0,10);
}

function getWeekData() {
  if (!state[currentWeek]) state[currentWeek] = { personal: [], prayer: [], life: {}, comments: {}, entries: [] };
  return state[currentWeek];
}

function save() { localStorage.setItem('manny_report_v3', JSON.stringify(state)); }

function navTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + screen).classList.add('active');
  if(screen === 'service') renderService();
  if(screen === 'life') renderLife();
}

// ── LIFE RENDER ──
function renderLife() {
  const data = getWeekData();
  const personalGrid = document.getElementById('personal-grid');
  const prayerGrid = document.getElementById('prayer-grid');
  
  const genGrid = (arr, id) => {
    return DAYS.map((d, i) => `
      <div class="day-cell">
        <div class="day-cell-label">${d.slice(0,3)}</div>
        <div class="check-box ${arr.includes(i) ? 'checked' : ''}" onclick="toggleCheck('${id}', ${i})"></div>
      </div>`).join('');
  };

  personalGrid.innerHTML = genGrid(data.personal, 'personal');
  prayerGrid.innerHTML = genGrid(data.prayer, 'prayer');
  document.getElementById('day-count').innerText = `${data.personal.length}/7`;
  document.getElementById('prayer-count').innerText = `${data.prayer.length}/7`;

  document.getElementById('life-rows').innerHTML = LIFE_KEYS.map(item => `
    <div class="life-row ${data.life[item.k] ? 'checked-row' : ''}">
      <div class="life-row-inline">
        <div style="display:flex; justify-content:space-between; width:100%">
          <span>${item.l}</span>
          <div class="check-box ${data.life[item.k] ? 'checked' : ''}" onclick="toggleLifeBool('${item.k}')"></div>
        </div>
        ${item.c ? `<textarea class="inline-comment" onchange="saveComment('${item.k}', this.value)" placeholder="With whom...">${data.comments[item.k] || ''}</textarea>` : ''}
      </div>
    </div>
  `).join('');
}

function toggleCheck(key, day) {
  const data = getWeekData();
  if (data[key].includes(day)) data[key] = data[key].filter(d => d !== day);
  else data[key].push(day);
  save(); renderLife();
}

function toggleLifeBool(k) {
  const data = getWeekData();
  data.life[k] = !data.life[k];
  save(); renderLife();
}

function saveComment(k, v) { getWeekData().comments[k] = v; save(); }

// ── SERVICE RENDER ──
function renderService() {
  const data = getWeekData();
  let counts = { app: 0, gos: 0, misc: 0 };
  data.entries.forEach(e => counts[e.cat]++);
  
  document.getElementById('tot-app').innerText = `${counts.app} / 10`;
  document.getElementById('tot-gos').innerText = `${counts.gos} / 2`;
  document.getElementById('tot-misc').innerText = counts.misc;

  const list = document.getElementById('entry-list');
  list.innerHTML = '';

  data.entries.forEach((e, idx) => {
    const container = document.createElement('div');
    container.className = 'entry-container';
    container.innerHTML = `
      <div class="swipe-action swipe-edit">EDIT</div>
      <div class="swipe-action swipe-del">DEL</div>
      <div class="entry-item" id="entry-${idx}" 
           ontouchstart="handleTouchStart(event, ${idx})" 
           ontouchmove="handleTouchMove(event, ${idx})" 
           ontouchend="handleTouchEnd(event, ${idx})">
        <div class="entry-dot ${e.cat}"></div>
        <div style="flex:1">
          <div style="font-weight:500; font-size:14px">${e.desc}</div>
          <div style="font-size:11px; color:var(--text3); font-family:DM Mono">${e.day} • ${e.time} ${e.ampm} ${e.apptType ? ' • '+e.apptType : ''}</div>
        </div>
        <div style="color:var(--text3); font-size:18px">≡</div>
      </div>
    `;
    list.appendChild(container);
  });

  new Sortable(list, {
    animation: 150,
    onEnd: (evt) => {
      const data = getWeekData();
      const item = data.entries.splice(evt.oldIndex, 1)[0];
      data.entries.splice(evt.newIndex, 0, item);
      save();
    }
  });
}

// ── SWIPE LOGIC ──
let touchStartX = 0;
let currentSwipeIdx = null;

function handleTouchStart(e, idx) { touchStartX = e.touches[0].clientX; currentSwipeIdx = idx; }
function handleTouchMove(e, idx) {
  let diff = e.touches[0].clientX - touchStartX;
  let el = document.getElementById(`entry-${idx}`);
  if (diff > 10) el.style.transform = `translateX(${Math.min(diff, 60)}px)`;
  if (diff < -10) el.style.transform = `translateX(${Math.max(diff, -60)}px)`;
}
function handleTouchEnd(e, idx) {
  let el = document.getElementById(`entry-${idx}`);
  let diff = e.changedTouches[0].clientX - touchStartX;
  el.style.transform = '';
  if (diff > 40) openEdit(idx);
  else if (diff < -40) deleteEntry(idx);
}

// ── FORM LOGIC ──
function populateTime() {
  const sel = document.getElementById('f-start-time');
  sel.innerHTML = '';
  for(let h=1; h<=12; h++) {
    [0, 15, 30, 45].forEach(m => {
      let val = `${h}:${m === 0 ? '00' : m}`;
      sel.innerHTML += `<option value="${val}">${val}</option>`;
    });
  }
}

function openAdd() {
  editingId = null;
  document.getElementById('form-title').innerText = "New Entry";
  const now = new Date();
  let h = now.getHours();
  let m = Math.round(now.getMinutes() / 15) * 15;
  if(m === 60) { m = 0; h++; }
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  
  document.getElementById('f-day').value = DAYS[now.getDay()];
  document.getElementById('f-start-time').value = `${h}:${m === 0 ? '00' : m}`;
  document.getElementById('f-start-ampm').value = ampm;
  document.getElementById('f-desc').value = '';
  navTo('add');
}

function openEdit(idx) {
  editingId = idx;
  const e = getWeekData().entries[idx];
  document.getElementById('form-title').innerText = "Edit Entry";
  document.getElementById('f-day').value = e.day;
  document.getElementById('f-start-time').value = e.time;
  document.getElementById('f-start-ampm').value = e.ampm;
  document.getElementById('f-desc').value = e.desc;
  document.getElementById('f-cat').value = e.cat;
  document.getElementById('f-appt-type').value = e.apptType || 'student';
  toggleApptType();
  navTo('add');
}

function saveEntry() {
  const data = getWeekData();
  const entry = {
    day: document.getElementById('f-day').value,
    time: document.getElementById('f-start-time').value,
    ampm: document.getElementById('f-start-ampm').value,
    desc: document.getElementById('f-desc').value,
    cat: document.getElementById('f-cat').value,
    apptType: document.getElementById('f-cat').value === 'app' ? document.getElementById('f-appt-type').value : null
  };

  if (editingId !== null) data.entries[editingId] = entry;
  else data.entries.push(entry);

  save(); navTo('service');
}

function deleteEntry(idx) {
  if (confirm("Delete entry?")) {
    getWeekData().entries.splice(idx, 1);
    save(); renderService();
  }
}

function toggleApptType() {
  document.getElementById('f-appt-type').style.display = 
    document.getElementById('f-cat').value === 'app' ? 'block' : 'none';
}

function shiftWeek(dir) {
  let d = new Date(currentWeek);
  d.setDate(d.getDate() + (dir * 7));
  currentWeek = getMondayStr(d);
  document.getElementById('week-label').innerText = currentWeek.slice(5);
  renderLife(); renderService();
}

function exportCSV() {
  const data = getWeekData();
  let csv = "Category,Day,Time,Description,Meta\n";
  data.entries.forEach(e => {
    csv += `${e.cat},${e.day},${e.time}${e.ampm},"${e.desc}",${e.apptType || ''}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', `report_${currentWeek}.csv`);
  a.click();
}

// Init
document.getElementById('week-label').innerText = currentWeek.slice(5);
populateTime();
renderLife();
renderService();
</script>
</body>
</html>
